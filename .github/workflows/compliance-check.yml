# Centralized Compliance Check
# Runs FROM this repo (swe-standards) and checks all repos listed in repos.yml.
# Opens PRs in target repos when standards drift is detected.
#
# Requires: COMPLIANCE_TOKEN secret (PAT with repo scope for cross-repo access)

name: Standards Compliance Check

on:
  schedule:
    - cron: '0 8 * * 1-5'  # Weekdays at 8:00 UTC
  workflow_dispatch:        # Manual trigger
    inputs:
      repo_filter:
        description: 'Check only this repo (owner/repo), or leave empty for all'
        required: false
        type: string

jobs:
  load-repos:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.repos.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Build repo matrix
        id: repos
        run: |
          FILTER="${{ inputs.repo_filter }}"
          if [[ -n "$FILTER" ]]; then
            OWNER=$(echo "$FILTER" | cut -d'/' -f1)
            REPO=$(echo "$FILTER" | cut -d'/' -f2)
            echo "matrix=[{\"owner\":\"$OWNER\",\"repo\":\"$REPO\"}]" >> $GITHUB_OUTPUT
          else
            MATRIX=$(yq -o=json -I=0 '[.repositories[] | {"owner": .owner, "repo": .repo}]' repos.yml)
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          fi

  check-repo:
    needs: load-repos
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.load-repos.outputs.matrix) }}
    steps:
      - name: Checkout standards
        uses: actions/checkout@v4
        with:
          path: standards

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.target.owner }}/${{ matrix.target.repo }}
          token: ${{ secrets.COMPLIANCE_TOKEN }}
          path: target

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run compliance checks
        id: check
        working-directory: target
        run: |
          set -euo pipefail

          FIXES_NEEDED=false
          REPORT="## 🏛️ Standards Compliance Report\n\n"
          REPORT+="**Repository:** \`${{ matrix.target.owner }}/${{ matrix.target.repo }}\`\n"
          REPORT+="**Checked at:** $(date -u '+%Y-%m-%d %H:%M UTC')\n\n"

          STANDARDS="$GITHUB_WORKSPACE/standards"

          # ── 1. Check required files ──
          REPORT+="### Required Files\n\n"
          while IFS= read -r file; do
            if [[ ! -f "$file" ]]; then
              echo "❌ Missing: $file"
              REPORT+="- ❌ Missing: \`$file\`\n"
              FIXES_NEEDED=true
            else
              echo "✅ Found: $file"
              REPORT+="- ✅ Found: \`$file\`\n"
            fi
          done < <(yq '.required_files[].path' "$STANDARDS/standards/required-files.yml")

          # ── 2. Check README sections ──
          REPORT+="\n### README Sections\n\n"
          if [[ -f README.md ]]; then
            while IFS= read -r section; do
              ALIASES=$(yq ".required_sections[] | select(.heading == \"$section\") | .aliases[]" "$STANDARDS/standards/readme-rules.yml" 2>/dev/null || echo "")
              FOUND=false
              for term in "$section" $ALIASES; do
                if grep -qi "^#.*$term" README.md 2>/dev/null; then
                  FOUND=true
                  break
                fi
              done
              if [[ "$FOUND" == "true" ]]; then
                echo "✅ README section: $section"
                REPORT+="- ✅ \`$section\`\n"
              else
                echo "❌ README missing section: $section"
                REPORT+="- ❌ Missing: \`$section\`\n"
                FIXES_NEEDED=true
              fi
            done < <(yq '.required_sections[].heading' "$STANDARDS/standards/readme-rules.yml")
          else
            REPORT+="- ❌ No README.md found\n"
            FIXES_NEEDED=true
          fi

          # ── 3. Check architecture doc ──
          REPORT+="\n### Architecture Documentation\n\n"
          if [[ -f docs/architecture.md ]]; then
            HAS_DIAGRAM=false
            while IFS= read -r pattern; do
              if grep -q "$pattern" docs/architecture.md 2>/dev/null; then
                HAS_DIAGRAM=true
                break
              fi
            done < <(yq '.rules[] | select(.name == "architecture-has-diagram") | .patterns[]' "$STANDARDS/standards/architecture-rules.yml")
            if [[ "$HAS_DIAGRAM" == "true" ]]; then
              REPORT+="- ✅ Architecture doc has diagram\n"
            else
              REPORT+="- ❌ Architecture doc missing diagram\n"
              FIXES_NEEDED=true
            fi
          else
            REPORT+="- ❌ Missing \`docs/architecture.md\`\n"
            FIXES_NEEDED=true
          fi

          # ── Save outputs ──
          echo "fixes_needed=$FIXES_NEEDED" >> $GITHUB_OUTPUT
          echo -e "$REPORT" > /tmp/compliance-report.md
          cat /tmp/compliance-report.md

      - name: Apply template fixes
        if: steps.check.outputs.fixes_needed == 'true'
        working-directory: target
        run: |
          STANDARDS="$GITHUB_WORKSPACE/standards"

          while IFS= read -r entry; do
            FILE_PATH=$(echo "$entry" | yq '.path')
            TEMPLATE=$(echo "$entry" | yq '.template // ""')

            if [[ ! -f "$FILE_PATH" && -n "$TEMPLATE" && "$TEMPLATE" != "null" ]]; then
              TEMPLATE_PATH="$STANDARDS/$TEMPLATE"
              if [[ -f "$TEMPLATE_PATH" ]]; then
                mkdir -p "$(dirname "$FILE_PATH")"
                cp "$TEMPLATE_PATH" "$FILE_PATH"
                echo "Created $FILE_PATH from template"
              fi
            fi
          done < <(yq -o=json -I=0 '.required_files[]' "$STANDARDS/standards/required-files.yml")

      - name: Push fixes and create PR
        if: steps.check.outputs.fixes_needed == 'true'
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.COMPLIANCE_TOKEN }}
        run: |
          BRANCH="auto/compliance-fixes-$(date +%Y%m%d)"

          git config user.name "swe-standards[bot]"
          git config user.email "swe-standards[bot]@users.noreply.github.com"

          # Check if branch already exists (avoid duplicate PRs)
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH already exists — skipping to avoid duplicate PR"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add -A

          if git diff --cached --quiet; then
            echo "No file changes to commit"
            exit 0
          fi

          git commit -m "fix: apply standards compliance fixes

          Auto-generated by swe-standards compliance check.
          Standards repo: https://github.com/jkordick/swe-standards"

          git push origin "$BRANCH"

          REPORT=$(cat /tmp/compliance-report.md)
          gh pr create \
            --repo "${{ matrix.target.owner }}/${{ matrix.target.repo }}" \
            --title "🏛️ Standards Compliance: Auto-fix $(date +%Y-%m-%d)" \
            --body "$REPORT

          ---
          *Auto-generated by [swe-standards](https://github.com/jkordick/swe-standards). Review and merge if changes look correct.*" \
            --base main \
            --head "$BRANCH"
